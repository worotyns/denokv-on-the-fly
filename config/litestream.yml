# /etc/litestream/litestream.yml
# ---------------------------------------------------------------------------
# Litestream continuously replicates the denokv SQLite file to an S3-
# compatible bucket.
#
# Credentials are read automatically from standard AWS env vars:
#   AWS_ACCESS_KEY_ID        – set by `flyctl storage create` (Tigris) or manually
#   AWS_SECRET_ACCESS_KEY    – set by `flyctl storage create` (Tigris) or manually
#
# Other required env vars (fly.toml [env] or secrets):
#   S3_BUCKET      – bucket name  (secret: BUCKET_NAME from Tigris)
#   S3_PATH        – prefix path  (fly.toml [env])
#   S3_ENDPOINT    – custom endpoint for Tigris / B2 / MinIO (fly.toml [env])
# ---------------------------------------------------------------------------

dbs:
  - path: /data/denokv.sqlite
    replicas:
      - type: s3
        bucket: ${S3_BUCKET}
        path: ${S3_PATH}
        endpoint: ${S3_ENDPOINT}
        # Credentials come from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars.
        # No need to set them here – Litestream reads them automatically.
        sync-interval: 1s
        retention: 168h
        retention-check-interval: 1h
        snapshot-interval: 6h
